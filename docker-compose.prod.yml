# AstroML Production Docker Compose
# Optimized for production deployment with health checks, resource limits, and logging

version: '3.8'

services:
  # PostgreSQL Database - Production
  postgres:
    image: postgres:15-alpine
    container_name: astroml-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astroml}
      POSTGRES_USER: ${POSTGRES_USER:-astroml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - astroml-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astroml} -d ${POSTGRES_DB:-astroml}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - Production
  redis:
    image: redis:7-alpine
    container_name: astroml-redis-prod
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - astroml-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # AstroML Ingestion Service
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: astroml-ingestion-prod
    environment:
      ASTROML_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-astroml}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-astroml}
      REDIS_URL: redis://redis:6379/0
      FEATURE_STORE_PATH: /app/feature_store
    volumes:
      - feature_store:/app/feature_store
      - ./config:/app/config:ro
    networks:
      - astroml-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import astroml.ingestion; import astroml.features; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # AstroML Training Service
  training:
    build:
      context: .
      dockerfile: Dockerfile
      target: training
    container_name: astroml-training-prod
    environment:
      ASTROML_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-astroml}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-astroml}
      REDIS_URL: redis://redis:6379/0
      FEATURE_STORE_PATH: /app/feature_store
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - feature_store:/app/feature_store
      - ./config:/app/config:ro
      - model_store:/app/models
    networks:
      - astroml-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; import astroml.features; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 32G
        reservations:
          cpus: '2.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Feature Store Service
  feature-store:
    build:
      context: .
      dockerfile: Dockerfile
      target: feature-store
    container_name: astroml-feature-store-prod
    environment:
      ASTROML_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-astroml}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-astroml}
      REDIS_URL: redis://redis:6379/0
      FEATURE_STORE_PATH: /app/feature_store
    ports:
      - "${FEATURE_STORE_PORT:-8000}:8000"
    volumes:
      - feature_store:/app/feature_store
    networks:
      - astroml-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from astroml.features import create_feature_store; store = create_feature_store('/app/feature_store'); print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  feature_store:
    driver: local
  model_store:
    driver: local

networks:
  astroml-network:
    driver: bridge
