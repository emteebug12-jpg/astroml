apiVersion: v1
kind: ConfigMap
metadata:
  name: feature-store-config
  namespace: astroml
data:
  FEATURE_STORE_PATH: "/app/feature_store"
  FEATURE_STORE_CACHE_SIZE: "1000"
  FEATURE_STORE_CACHE_TTL: "3600"
  LOG_LEVEL: "INFO"
  ASTROML_ENV: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-store
  namespace: astroml
  labels:
    app: feature-store
    component: feature-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feature-store
  template:
    metadata:
      labels:
        app: feature-store
        component: feature-store
    spec:
      serviceAccountName: astroml
      containers:
      - name: feature-store
        image: astroml:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: astroml-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: astroml-config
              key: REDIS_URL
        - name: FEATURE_STORE_PATH
          valueFrom:
            configMapKeyRef:
              name: feature-store-config
              key: FEATURE_STORE_PATH
        - name: FEATURE_STORE_CACHE_SIZE
          valueFrom:
            configMapKeyRef:
              name: feature-store-config
              key: FEATURE_STORE_CACHE_SIZE
        - name: FEATURE_STORE_CACHE_TTL
          valueFrom:
            configMapKeyRef:
              name: feature-store-config
              key: FEATURE_STORE_CACHE_TTL
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: feature-store-config
              key: LOG_LEVEL
        - name: ASTROML_ENV
          valueFrom:
            configMapKeyRef:
              name: feature-store-config
              key: ASTROML_ENV
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8080
          name: metrics
        command: ["python", "-c"]
        args:
          - |
            from astroml.features import create_feature_store
            store = create_feature_store('/app/feature_store')
            print('Feature Store service ready')
            import time
            while True:
                time.sleep(60)
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: feature-store-storage
          mountPath: /app/feature_store
      volumes:
      - name: feature-store-storage
        persistentVolumeClaim:
          claimName: feature-store-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: feature-store
  namespace: astroml
  labels:
    app: feature-store
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  - port: 8080
    targetPort: 8080
    name: metrics
  selector:
    app: feature-store
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: feature-store-pvc
  namespace: astroml
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feature-store-hpa
  namespace: astroml
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feature-store
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
