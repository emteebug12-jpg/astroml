apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: astroml-ingress
  namespace: astroml
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - astroml.example.com
    secretName: astroml-tls
  rules:
  - host: astroml.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: astroml-ingestion
            port:
              number: 8000
      - path: /feature-store
        pathType: Prefix
        backend:
          service:
            name: feature-store
            port:
              number: 8000
      - path: /training
        pathType: Prefix
        backend:
          service:
            name: astroml-training
            port:
              number: 6006
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: astroml-monitoring-ingress
  namespace: astroml
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - monitoring.astroml.example.com
    secretName: astroml-monitoring-tls
  rules:
  - host: monitoring.astroml.example.com
    http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
